<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>QR Love</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* glow background */
.glow{
    position:absolute;
    width:400px;
    height:400px;
    background:radial-gradient(circle, gold, transparent 70%);
    filter:blur(80px);
    opacity:.4;
}

/* heart shape */
.heart {
    position: relative;
    width: 260px;
    height: 230px;
    transform: rotate(-45deg);
    background: transparent;
}

/* heart pseudo */
.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 230px;
    background: #111;
    border:2px solid gold;
    border-radius: 50%;
}

.heart::before {
    top: -130px;
    left: 0;
}

.heart::after {
    left: 130px;
    top: 0;
}

/* QR inside */
.qr {
    position: absolute;
    width: 180px;
    height: 180px;
    top: 25px;
    left: 40px;
    transform: rotate(45deg);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,215,0,0.4);
}

.qr img{
    width:100%;
    height:100%;
}

/* text */
.text{
    position:absolute;
    bottom:80px;
    color:gold;
    font-family:sans-serif;
    font-size:14px;
    text-align:center;
    width:100%;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="heart">
    <div class="qr">
        <!-- GANTI LINK DI BAWAH INI -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&" />
    </div>
</div>

<div class="text">scan this → unlock my heart ❤️</div>

</body>
</html>
